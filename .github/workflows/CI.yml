# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Continuous Integration

on:
  # Trigger on pull requests only. A PR-branch push already fires the
  # `pull_request` (synchronize) event, so also listening on `push` would
  # start a second, redundant run for the same commit — one event, one run.
  pull_request:
    branches:
      - '**'        # matches every branch


permissions:
  contents: read  # to fetch code
  actions: write  # to cancel previous workflows

# This is what will cancel the workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  test_linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.13" ]

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v6
      - name: Print concurrency group
        run: echo '${{ github.workflow }}-${{ github.ref }}'
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip cache purge
          python -m pip install --upgrade pip setuptools   --no-cache-dir
          python -m pip install -r requirements-dev-cpu.txt  --no-cache-dir
          pip install .  --no-cache-dir
      - name: Test with pytest
        run: |
          # Run the FULL suite, including `slow` (compilation-heavy numba) variants that the
          # default `pytest` invocation skips via addopts in pyproject.toml.
          pytest brainevent/ -m ""


  test_macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.13" ]

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v6
      - name: Print concurrency group
        run: echo '${{ github.workflow }}-${{ github.ref }}'
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip cache purge
          python -m pip install --upgrade pip setuptools  --no-cache-dir
          python -m pip install -r requirements-dev-cpu.txt  --no-cache-dir
          pip install .  --no-cache-dir
      - name: Test with pytest
        run: |
          # Run the FULL suite, including `slow` (compilation-heavy numba) variants that the
          # default `pytest` invocation skips via addopts in pyproject.toml.
          pytest brainevent/ -m ""


  test_windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.13" ]

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v6
      - name: Print concurrency group
        run: echo '${{ github.workflow }}-${{ github.ref }}'
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip cache purge
          python -m pip install --upgrade pip setuptools  --no-cache-dir
          python -m pip install -r requirements-dev-cpu.txt  --no-cache-dir
          pip install .  --no-cache-dir
      - name: Test with pytest
        run: |
          # Run the FULL suite, including `slow` (compilation-heavy numba) variants.
          pytest brainevent/ -m "" -p no:faulthandler


  type_check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.13" ]

    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.1
        with:
          access_token: ${{ github.token }}
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install type-check tooling
        run: |
          python -m pip install --upgrade pip --no-cache-dir
          python -m pip install -r requirements-typecheck.txt --no-cache-dir
      - name: mypy ratchet (PEP 561)
        # mypy still exits non-zero while the baseline errors exist, so the ratchet
        # verdict comes solely from `mypy-baseline filter`, which fails ONLY when a new
        # error appears. `--allow-unsynced` lets contributors fix errors without having
        # to re-sync the baseline in the same PR.
        run: |
          mypy brainevent/ > mypy-report.txt || true
          mypy-baseline filter --allow-unsynced --baseline-path mypy-baseline.txt < mypy-report.txt




